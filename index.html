<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 24px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 12px 20px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:active {
      transform: scale(0.96);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #718096;
      margin-bottom: 12px;
      padding: 0 4px;
    }

    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .list li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f7fafc;
      border-radius: 10px;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .list li:hover {
      border-color: #e2e8f0;
      background: #fff;
    }

    .list li.checked {
      background: #f0fff4;
      border-color: #c6f6d5;
    }

    .list li input[type="checkbox"] {
      width: 20px;
      height: 20px;
      accent-color: #48bb78;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 0.95rem;
      color: #2d3748;
      transition: all 0.2s;
    }

    .list li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      line-height: 1;
    }

    .delete-btn:hover {
      color: #fc8181;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      padding: 40px 0;
      color: #a0aec0;
      font-size: 0.9rem;
    }

    .empty span {
      display: block;
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .clear-btn {
      margin-top: 20px;
      width: 100%;
      padding: 10px;
      background: none;
      border: 2px solid #fed7d7;
      color: #fc8181;
      border-radius: 10px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .clear-btn:hover {
      background: #fff5f5;
      border-color: #fc8181;
    }

    .error-msg {
      margin-top: 12px;
      padding: 10px 14px;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 8px;
      color: #c53030;
      font-size: 0.82rem;
    }

    .loading-msg {
      text-align: center;
      padding: 20px 0;
      color: #a0aec0;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>쇼핑 리스트</h1>
    <p class="subtitle">오늘 구매할 항목을 추가하세요</p>

    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." maxlength="60">
      <button onclick="addItem()" title="추가">+</button>
    </div>

    <div class="stats">
      <span id="totalCount">총 0개</span>
      <span id="checkedCount">완료 0개</span>
    </div>

    <ul class="list" id="list"></ul>

    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" style="display:none">
      완료된 항목 삭제
    </button>

    <div class="error-msg" id="errorMsg" style="display:none"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://ghxggfmthahzvaapanas.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdoeGdnZm10aGFoenZhYXBhbmFzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NDY2ODQsImV4cCI6MjA5MDAyMjY4NH0.elM9a-8g9kXJLtYvqD5TtDAgYXhTMOPe-RYObe4oeP4';

    const { createClient } = window.supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = '오류: ' + msg;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 5000);
    }

    async function loadItems() {
      const list = document.getElementById('list');
      list.innerHTML = '<li style="background:none;border:none;"><div class="loading-msg">불러오는 중...</div></li>';
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: false });
      if (error) { showError(error.message); return; }
      items = data;
      render();
    }

    function render() {
      const list = document.getElementById('list');
      const totalCount = document.getElementById('totalCount');
      const checkedCount = document.getElementById('checkedCount');
      const clearBtn = document.getElementById('clearBtn');
      const checked = items.filter(i => i.checked).length;

      totalCount.textContent = `총 ${items.length}개`;
      checkedCount.textContent = `완료 ${checked}개`;
      clearBtn.style.display = checked > 0 ? 'block' : 'none';

      if (items.length === 0) {
        list.innerHTML = `
          <li style="background:none;border:none;justify-content:center;">
            <div class="empty">
              <span>🛒</span>
              아직 추가된 아이템이 없어요
            </div>
          </li>`;
        return;
      }

      list.innerHTML = items.map((item) => `
        <li class="${item.checked ? 'checked' : ''}">
          <input type="checkbox" ${item.checked ? 'checked' : ''}
            onchange="toggleItem('${item.id}', this.checked)">
          <span class="item-text">${escapeHtml(item.text)}</span>
          <button class="delete-btn" onclick="deleteItem('${item.id}')" title="삭제">✕</button>
        </li>
      `).join('');
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) { input.focus(); return; }
      input.value = '';
      input.focus();
      const { data, error } = await db
        .from('shopping_items')
        .insert({ text, checked: false })
        .select()
        .single();
      if (error) { showError(error.message); return; }
      items.unshift(data);
      render();
    }

    async function toggleItem(id, checked) {
      const { error } = await db
        .from('shopping_items')
        .update({ checked })
        .eq('id', id);
      if (error) { showError(error.message); return; }
      const item = items.find(i => i.id === id);
      if (item) item.checked = checked;
      render();
    }

    async function deleteItem(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);
      if (error) { showError(error.message); return; }
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);
      if (error) { showError(error.message); return; }
      items = items.filter(i => !i.checked);
      render();
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
